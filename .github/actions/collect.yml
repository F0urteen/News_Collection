name: 热点新闻采集

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  collect:
    name: 采集与入库
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 执行采集脚本
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          echo "========== 采集开始 $(date '+%Y-%m-%d %H:%M:%S') =========="
          cd scripts
          python3 main.py 2>&1
      - name: 上传采集结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collect-result-${{ github.run_number }}
          path: scripts/result.json
          retention-days: 7
